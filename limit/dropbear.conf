# FIX #24: dropbear TIDAK lagi listen di 22 (konflik dengan sshd).
# Tetap meng-handle 109 & 110 + port utama 143.
DROPBEAR_PORT=143
DROPBEAR_RECEIVE_WINDOW=65536
DROPBEAR_BANNER="/etc/kyt.txt"
DROPBEAR_EXTRA_ARGS="-p 109 -p 110 -b /etc/kyt.txt -r /etc/dropbear/dropbear_rsa_host_key -r /etc/dropbear/dropbear_ed25519_host_key"
